name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:17 UTC -- catches silent breakage from dependency
    # updates (faker, ajv, commander) even without a code change.
    - cron: "17 3 * * *"
  workflow_dispatch: {}

jobs:
  test:
    name: Typecheck, build, and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test (dist/, every scenario preset)
        run: npm run smoke-test

      - name: Build static browser bundle and smoke-test it
        run: |
          npm run build:static
          node scripts/smoke-test-static.cjs

  cli-e2e:
    name: CLI end-to-end (generate, replay, stream, init)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: generate (json/sql/csv)
        run: |
          node dist/cli.js generate --users 20 --seed 1 --format json --output /tmp/eco.json
          node dist/cli.js generate --users 20 --seed 1 --format sql --output /tmp/eco.sql
          node dist/cli.js generate --users 20 --seed 1 --format csv --output /tmp/eco.csv

      - name: snapshot + replay are byte-identical
        run: |
          node dist/cli.js generate --users 20 --seed 7 --format json --output /tmp/run1.json --snapshot /tmp/run1.snapshot.json
          node dist/cli.js replay --input /tmp/run1.snapshot.json --format json --output /tmp/run1-replay.json
          diff /tmp/run1.json /tmp/run1-replay.json

      - name: stream mode produces valid NDJSON
        run: |
          node dist/cli.js generate --users 10 --seed 3 --stream > /tmp/eco.ndjson
          node -e "require('fs').readFileSync('/tmp/eco.ndjson','utf8').trim().split('\n').forEach(l => JSON.parse(l))"

      - name: scenario presets all run
        run: |
          for s in black-friday post-holiday-returns flash-sale supply-chain-crisis steady-state; do
            node dist/cli.js generate --scenario "$s" --users 20 --format json --output /tmp/"$s".json
          done

      - name: diff detects zero drift comparing a run to itself
        run: |
          node dist/cli.js generate --users 20 --seed 4 --format json --output /tmp/diffSame.json
          node dist/cli.js diff /tmp/diffSame.json /tmp/diffSame.json --fail-on-schema-change

      - name: multi-store generates N independent stores
        run: node dist/cli.js generate --stores 3 --users 10 --seed 1 --format json --output /tmp/stores.json

  mock-api-e2e:
    name: Mock API end-to-end (serve, chaos, auth, openapi, live)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: serve + basic REST endpoints
        run: |
          node dist/cli.js serve --users 50 --seed 1 --port 4500 &
          SERVER_PID=$!
          sleep 2
          curl -sf "http://localhost:4500/" > /dev/null
          curl -sf "http://localhost:4500/api/orders?pageSize=5" > /dev/null
          curl -sf "http://localhost:4500/openapi.json" > /dev/null
          kill $SERVER_PID

      - name: chaos mode injects failures at the configured rate
        run: |
          node dist/cli.js serve --users 50 --seed 1 --port 4501 --chaos --chaos-error-rate 1 --chaos-rate-limit-rate 0 --chaos-latency-rate 0 &
          SERVER_PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4501/api/orders")
          kill $SERVER_PID
          test "$STATUS" = "500"

      - name: api-key auth rejects unauthenticated requests
        run: |
          node dist/cli.js serve --users 50 --seed 1 --port 4502 --api-key testkey &
          SERVER_PID=$!
          sleep 2
          NOAUTH=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4502/api/orders")
          AUTHED=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer testkey" "http://localhost:4502/api/orders")
          kill $SERVER_PID
          test "$NOAUTH" = "401"
          test "$AUTHED" = "200"

      - name: openapi.json has no broken $ref pointers
        run: |
          node dist/cli.js serve --users 20 --seed 1 --port 4503 &
          SERVER_PID=$!
          sleep 2
          curl -sf "http://localhost:4503/openapi.json" -o /tmp/openapi.json
          kill $SERVER_PID
          node -e "
            const spec = require('/tmp/openapi.json');
            const names = new Set(Object.keys(spec.components.schemas));
            let refs = [];
            (function walk(o){ if (Array.isArray(o)) return o.forEach(walk); if (o && typeof o === 'object') { if (typeof o['\$ref'] === 'string') refs.push(o['\$ref']); Object.values(o).forEach(walk); } })(spec);
            const broken = refs.filter(r => !names.has(r.replace('#/components/schemas/','')));
            if (broken.length > 0) { console.error('broken refs:', broken); process.exit(1); }
            console.log('all', refs.length, 'refs resolve');
          "

      - name: webhook simulator dry-run produces chronological events
        run: node dist/cli.js webhook --url http://example.invalid --users 30 --seed 2 --dry-run --limit 10

      - name: postman collection export is valid and matches the /postman.json endpoint
        run: |
          node dist/cli.js serve --users 30 --seed 1 --port 4504 --postman --postman-output /tmp/eco.postman_collection.json --api-key testkey &
          SERVER_PID=$!
          sleep 2
          curl -sf "http://localhost:4504/postman.json" -o /tmp/postman-endpoint.json
          kill $SERVER_PID
          node -e "
            const fs = require('fs');
            const file = JSON.parse(fs.readFileSync('/tmp/eco.postman_collection.json', 'utf8'));
            const endpoint = JSON.parse(fs.readFileSync('/tmp/postman-endpoint.json', 'utf8'));
            if (JSON.stringify(file) !== JSON.stringify(endpoint)) { console.error('file and endpoint diverge'); process.exit(1); }
            if (!file.info.schema.includes('v2.1.0')) { console.error('wrong postman schema version'); process.exit(1); }
            if (file.auth.bearer[0].value !== 'testkey') { console.error('auth block missing/wrong'); process.exit(1); }
            console.log('postman collection OK:', file.item.length, 'top-level items');
          "

  benchmark:
    name: Benchmark (generation speed + relational integrity)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Run benchmark
        run: npm run benchmark

      - name: Commit benchmark-results.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- benchmark-results.json; then
            git add benchmark-results.json
            git commit -m "chore: update benchmark-results.json [skip ci]"
            git push
          else
            echo "No change in benchmark-results.json -- nothing to commit."
          fi

  adapters-e2e:
    name: Adapters end-to-end (MCP, tRPC, GraphQL, live OpenAPI inference)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: MCP server responds to a real stdio tool call
        run: |
          node -e "
            const { Client } = require('@modelcontextprotocol/sdk/client/index.js');
            const { StdioClientTransport } = require('@modelcontextprotocol/sdk/client/stdio.js');
            (async () => {
              const client = new Client({ name: 'ci-smoke-test', version: '1.0.0' });
              const transport = new StdioClientTransport({ command: 'node', args: ['dist/cli.js', 'mcp'] });
              await client.connect(transport);
              const { tools } = await client.listTools();
              if (tools.length !== 7) { console.error('expected 7 tools, got', tools.length); process.exit(1); }
              const result = await client.callTool({ name: 'generate_dataset', arguments: { scenario: 'steady-state', seed: 1, scaleFactor: 20 } });
              const body = JSON.parse(result.content[0].text);
              if (!body.datasetId) { console.error('generate_dataset did not return a datasetId'); process.exit(1); }
              console.log('MCP server OK:', tools.length, 'tools,', body.counts.orders, 'orders generated');
              await client.close();
              process.exit(0);
            })();
          "

      - name: Live OpenAPI schema inference against eco-faker's own running serve
        run: |
          node dist/cli.js serve --users 50 --seed 1 --port 4600 --quiet &
          SERVER_PID=$!
          sleep 2
          node dist/cli.js init --schema http://localhost:4600/openapi.json -o /tmp/mapping.json
          kill $SERVER_PID
          node -e "
            const m = require('/tmp/mapping.json');
            const unmapped = Object.entries(m).filter(([,v]) => v.targetModel === null);
            if (unmapped.length > 0) { console.error('unmapped tables:', unmapped.map(([k]) => k)); process.exit(1); }
            console.log('All', Object.keys(m).length, 'tables mapped against eco-faker\'s own live OpenAPI spec.');
          "
