name: Deploy static demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web-static/**"
      - "src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci
      - run: npm run build:static
      - name: Smoke-test the static bundle against a fake DOM
        run: node scripts/smoke-test-static.cjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
