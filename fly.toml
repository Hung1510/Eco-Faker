# fly.toml -- alternative to render.yaml. Deploy with:
#   fly launch --dockerfile Dockerfile.serve --copy-config --now
# (requires the flyctl CLI and a Fly.io account -- see README's
# "Hosted playground API" section)
app = "eco-faker-playground"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.serve"

[env]
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
